name: Generate Android Keystores

# Generates a debug keystore and a release keystore, then prints the
# base64-encoded values and passwords to the job summary so you can copy
# them into repository Secrets.  Run this once when setting up a new repo.
#
# Inputs (all optional – sensible defaults are provided):
#   key_alias       – alias used for the release key  (default: "release")
#   key_cn          – Common Name  (default: repo name)
#   key_o           – Organization (default: GitHub owner)
#   key_c           – Country code (default: "US")
#   validity_days   – key validity in days (default: 10000 ≈ 27 years)
#
# Passwords are generated randomly inside the job and are shown only in
# the job summary (visible only to users with write access to the repo).

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Release key alias'
        required: false
        default: 'release'
      key_cn:
        description: 'Common Name (CN) – typically your app or developer name'
        required: false
        default: ''
      key_o:
        description: 'Organization (O)'
        required: false
        default: ''
      key_c:
        description: 'Country code (C), e.g. JP, US'
        required: false
        default: 'US'
      validity_days:
        description: 'Key validity in days (default 10000 ≈ 27 years)'
        required: false
        default: '10000'

jobs:
  generate:
    name: Generate keystores
    runs-on: ubuntu-latest

    steps:
      - name: Resolve dname components
        id: dname
        env:
          INPUT_CN: ${{ inputs.key_cn }}
          INPUT_O: ${{ inputs.key_o }}
          INPUT_C: ${{ inputs.key_c }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
        run: |
          CN="${INPUT_CN:-${REPO##*/}}"
          O="${INPUT_O:-${OWNER}}"
          C="${INPUT_C:-US}"
          echo "cn=${CN}"   >> "$GITHUB_OUTPUT"
          echo "o=${O}"     >> "$GITHUB_OUTPUT"
          echo "c=${C}"     >> "$GITHUB_OUTPUT"

      - name: Generate random passwords
        id: passwords
        run: |
          STORE_PASS=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 24)
          KEY_PASS=$(openssl rand   -base64 24 | tr -dc 'A-Za-z0-9' | head -c 24)
          DEBUG_PASS=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 24)
          # Mask all three so they never appear in plain-text log lines
          echo "::add-mask::${STORE_PASS}"
          echo "::add-mask::${KEY_PASS}"
          echo "::add-mask::${DEBUG_PASS}"
          echo "store_pass=${STORE_PASS}"  >> "$GITHUB_OUTPUT"
          echo "key_pass=${KEY_PASS}"      >> "$GITHUB_OUTPUT"
          echo "debug_pass=${DEBUG_PASS}"  >> "$GITHUB_OUTPUT"

      - name: Generate release keystore
        env:
          KEY_ALIAS: ${{ inputs.key_alias }}
          VALIDITY: ${{ inputs.validity_days }}
          STORE_PASS: ${{ steps.passwords.outputs.store_pass }}
          KEY_PASS: ${{ steps.passwords.outputs.key_pass }}
          CN: ${{ steps.dname.outputs.cn }}
          O: ${{ steps.dname.outputs.o }}
          C: ${{ steps.dname.outputs.c }}
        run: |
          DNAME="CN=${CN}, O=${O}, C=${C}"
          keytool -genkeypair \
            -keystore release.jks \
            -alias      "${KEY_ALIAS}" \
            -keyalg     RSA \
            -keysize    4096 \
            -validity   "${VALIDITY}" \
            -storepass  "${STORE_PASS}" \
            -keypass    "${KEY_PASS}" \
            -dname      "${DNAME}" \
            -storetype  JKS
          echo "✅ Release keystore generated"

      - name: Generate debug keystore
        env:
          DEBUG_PASS: ${{ steps.passwords.outputs.debug_pass }}
          CN: ${{ steps.dname.outputs.cn }}
          O: ${{ steps.dname.outputs.o }}
          C: ${{ steps.dname.outputs.c }}
        run: |
          DNAME="CN=${CN}, O=${O}, C=${C}"
          keytool -genkeypair \
            -keystore debug.keystore \
            -alias      androiddebugkey \
            -keyalg     RSA \
            -keysize    2048 \
            -validity   10000 \
            -storepass  "${DEBUG_PASS}" \
            -keypass    "${DEBUG_PASS}" \
            -dname      "${DNAME}" \
            -storetype  JKS
          echo "✅ Debug keystore generated"

      - name: Encode keystores to base64
        id: encode
        run: |
          RELEASE_B64=$(base64 -w 0 release.jks)
          DEBUG_B64=$(base64 -w 0 debug.keystore)
          echo "::add-mask::${RELEASE_B64}"
          echo "::add-mask::${DEBUG_B64}"
          echo "release_b64=${RELEASE_B64}" >> "$GITHUB_OUTPUT"
          echo "debug_b64=${DEBUG_B64}"     >> "$GITHUB_OUTPUT"

      - name: Write job summary
        env:
          KEY_ALIAS: ${{ inputs.key_alias }}
          STORE_PASS: ${{ steps.passwords.outputs.store_pass }}
          KEY_PASS: ${{ steps.passwords.outputs.key_pass }}
          DEBUG_PASS: ${{ steps.passwords.outputs.debug_pass }}
          RELEASE_B64: ${{ steps.encode.outputs.release_b64 }}
          DEBUG_B64: ${{ steps.encode.outputs.debug_b64 }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY_EOF'
          ## 🔑 Android Keystores — Setup Instructions

          Copy the values below into **Settings → Secrets and variables → Actions**
          of your repository.  The passwords are randomly generated and will not be
          shown again after this run.

          ---

          ### Release keystore secrets

          | Secret name | Value |
          |---|---|
          SUMMARY_EOF

          printf "| \`ANDROID_KEYSTORE_BASE64\`    | \`%s\` |\n" "${RELEASE_B64}"   >> "$GITHUB_STEP_SUMMARY"
          printf "| \`ANDROID_KEYSTORE_PASSWORD\` | \`%s\` |\n" "${STORE_PASS}"    >> "$GITHUB_STEP_SUMMARY"
          printf "| \`ANDROID_KEY_ALIAS\`          | \`%s\` |\n" "${KEY_ALIAS}"     >> "$GITHUB_STEP_SUMMARY"
          printf "| \`ANDROID_KEY_PASSWORD\`       | \`%s\` |\n" "${KEY_PASS}"      >> "$GITHUB_STEP_SUMMARY"

          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY_EOF'

          ---

          ### Debug keystore secret (optional)

          | Secret name | Value |
          |---|---|
          SUMMARY_EOF

          printf "| \`ANDROID_DEBUG_KEYSTORE_BASE64\` | \`%s\` |\n" "${DEBUG_B64}"  >> "$GITHUB_STEP_SUMMARY"

          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY_EOF'

          The debug keystore password is the same for both `-storepass` and
          `-keypass`.  The alias is `androiddebugkey`.

          ---

          > ⚠️ **Save these values now.**  Once you leave this page the passwords
          > cannot be recovered (the keystore files are not stored anywhere in the
          > repository).  If you lose the release keystore you will need to generate
          > a new one and bump the app's `applicationId` before users can upgrade.
          SUMMARY_EOF

      - name: Cleanup keystore files
        if: always()
        run: rm -f release.jks debug.keystore
