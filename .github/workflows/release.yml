name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to release (e.g. v1.3.0). Required when dispatching manually.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
    - name: Validate workflow_dispatch inputs
      if: github.event_name == 'workflow_dispatch'
      run: |
        TAG="${{ inputs.tag_name }}"
        if [ -z "$TAG" ]; then
          echo "❌ tag_name is required when running workflow_dispatch. Provide a value such as 'v1.3.0'."
          exit 1
        fi
        if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "❌ tag_name '${TAG}' is not a valid version tag. Expected format: v<major>.<minor>.<patch> (e.g. v1.3.0)."
          exit 1
        fi

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        ref: ${{ inputs.tag_name != '' && github.sha || github.ref }}

    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run tests
      run: ./gradlew test --stacktrace

    - name: Validate signing secrets
      env:
        KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        test -n "$KEYSTORE_BASE64"   || (echo "Missing secret: ANDROID_KEYSTORE_BASE64" && exit 1)
        test -n "$KEYSTORE_PASSWORD" || (echo "Missing secret: ANDROID_KEYSTORE_PASSWORD" && exit 1)
        test -n "$KEY_ALIAS"         || (echo "Missing secret: ANDROID_KEY_ALIAS" && exit 1)
        test -n "$KEY_PASSWORD"      || (echo "Missing secret: ANDROID_KEY_PASSWORD" && exit 1)

    - name: Decode signing keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 -d > app-release.jks
        ls -lh app-release.jks

    - name: Build Release APK (signed)
      env:
        ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/app-release.jks
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: ./gradlew assembleRelease --stacktrace

    - name: Verify APK was built
      run: |
        if [ -f app/build/outputs/apk/release/app-release.apk ]; then
          echo "✅ APK built successfully"
          ls -lh app/build/outputs/apk/release/app-release.apk
        else
          echo "❌ APK not found at expected location"
          echo "Contents of release directory:"
          ls -la app/build/outputs/apk/release/ || echo "Release directory not found"
          exit 1
        fi

    - name: Upload Release APK
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      with:
        name: app-release-signed
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 90

    - name: Get version from tag
      id: get_version
      if: startsWith(github.ref, 'refs/tags/') || inputs.tag_name != ''
      env:
        INPUT_TAG: ${{ inputs.tag_name }}
      run: |
        if [ -n "$INPUT_TAG" ]; then
          echo "VERSION=$INPUT_TAG" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/') || inputs.tag_name != ''
      uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
      with:
        tag_name: ${{ steps.get_version.outputs.VERSION }}
        files: app/build/outputs/apk/release/app-release.apk
        body: |
          ## ${{ github.event.repository.name }} ${{ steps.get_version.outputs.VERSION }}

          ### 📦 Asset
          - `app-release.apk` (signed)

          ### 📝 Changelog
          <!-- Replace this with your release notes -->
          - See commit history for changes

          ### 🔐 Security
          This build is signed and ready to install.

          ### ⚠️ Install Note
          Sideload only from this official repository release page.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # softprops/action-gh-release still targets node20; opt into node24 to suppress deprecation warning

    - name: Cleanup signing keystore
      if: always()
      run: rm -f app-release.jks
    
